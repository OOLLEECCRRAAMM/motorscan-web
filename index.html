<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MotorScan Global AI</title>

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #app-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at center, rgba(0,255,200,0.06) 0%, rgba(0,0,0,0) 45%),
        #000;
    }

    #motor-viewport {
      position: relative;
      width: min(90vw, 400px);
      height: min(90vw, 400px);
      border: 2px solid rgba(0, 255, 200, 0.18);
      border-radius: 20px;
      overflow: hidden;
      background: #050505;
      box-shadow:
        0 0 24px rgba(0, 255, 200, 0.14),
        inset 0 0 20px rgba(255, 255, 255, 0.03);
    }

    #motor-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transform-origin: center center;
      transition: transform 3s cubic-bezier(0.45, 0.05, 0.55, 0.95), filter 3s ease, opacity 3s ease;
      background: #111;
    }

    .zoom-active {
      transform: scale(5) translate(10%, 10%);
      filter: blur(2px);
      opacity: 0.55;
    }

    #btn-scan {
      margin-top: 28px;
      padding: 15px 34px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      background: #00ffc8;
      color: #000;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      box-shadow: 0 0 18px rgba(0, 255, 200, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    #btn-scan:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 24px rgba(0, 255, 200, 0.5);
    }

    #btn-scan:active {
      transform: scale(0.98);
    }

    #btn-scan:disabled {
      opacity: 0.7;
      cursor: default;
    }

    #status-text {
      margin-top: 14px;
      font-size: 12px;
      letter-spacing: 1.4px;
      color: #00ffc8;
      opacity: 0.9;
      text-align: center;
    }

    #debug {
      margin-top: 10px;
      max-width: 90vw;
      font-size: 11px;
      color: #ff7676;
      text-align: center;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div id="app-container">
    <div id="motor-viewport">
      <img id="motor-img" alt="Motor" />
    </div>

    <button id="btn-scan" type="button">Iniciar Passeio Técnico</button>
    <div id="status-text">AGUARDANDO COMANDO...</div>
    <div id="debug"></div>
  </div>

  <script>
    const caminhos = {
      imagemInicial: encodeURI('genérico/motor_bg.jpg'),
      audioBeep: encodeURI('interface do usuário/beep.mp3')
    };

    const img = document.getElementById('motor-img');
    const btn = document.getElementById('btn-scan');
    const statusText = document.getElementById('status-text');
    const debug = document.getElementById('debug');

    let somScan = null;
    let audioDesbloqueado = false;

    function mostrarErro(texto) {
      debug.textContent = texto;
      console.error(texto);
    }

    function limparErro() {
      debug.textContent = '';
    }

    function prepararAudio() {
      if (!somScan) {
        somScan = new Audio(caminhos.audioBeep);
        somScan.preload = 'auto';
        somScan.playsInline = true;
        somScan.setAttribute?.('playsinline', 'true');
      }
    }

    async function desbloquearAudio() {
      prepararAudio();

      try {
        somScan.muted = true;
        somScan.currentTime = 0;

        const promessa = somScan.play();
        if (promessa !== undefined) {
          await promessa;
        }

        somScan.pause();
        somScan.currentTime = 0;
        somScan.muted = false;
        audioDesbloqueado = true;
      } catch (erro) {
        audioDesbloqueado = false;
        console.warn('Não foi possível desbloquear o áudio agora:', erro);
      }
    }

    async function tocarBeep() {
      prepararAudio();

      try {
        somScan.pause();
        somScan.currentTime = 0;
        somScan.muted = false;

        const promessa = somScan.play();
        if (promessa !== undefined) {
          await promessa;
        }
      } catch (erro) {
        mostrarErro('O áudio não tocou. Verifique se o arquivo beep.mp3 está na pasta "interface do usuário".');
      }
    }

    async function iniciarDiagnostico() {
      limparErro();
      btn.disabled = true;

      await desbloquearAudio();
      await tocarBeep();

      img.classList.add('zoom-active');
      btn.style.display = 'none';
      statusText.textContent = 'NAVEGANDO PELAS ESQUINAS DO MOTOR...';

      setTimeout(() => {
        statusText.textContent = 'MAPEAMENTO CONCLUÍDO. GERANDO LAUDO...';
      }, 3500);
    }

    img.src = caminhos.imagemInicial;

    img.addEventListener('load', () => {
      limparErro();
    });

    img.addEventListener('error', () => {
      mostrarErro('A imagem não carregou. Verifique se o arquivo está em "genérico/motor_bg.jpg".');
    });

    btn.addEventListener('click', iniciarDiagnostico, { passive: true });

    document.addEventListener('pointerdown', desbloquearAudio, { once: true });
    document.addEventListener('touchstart', desbloquearAudio, { once: true, passive: true });
  </script>
</body>
</html>
