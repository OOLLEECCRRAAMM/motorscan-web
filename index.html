<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotorScan Global AI</title>
    <style>
        :root { --neon: #00f2ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: var(--neon); font-family: 'Segoe UI', Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 90%; max-width: 400px; text-align: center; border: 1px solid rgba(0,242,255,0.2); padding: 20px; border-radius: 20px; background: rgba(0,0,0,0.8); box-shadow: 0 0 30px rgba(0,0,0,1); }
        h1 { font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 5px; text-shadow: 0 0 10px var(--neon); }
        .sub { font-size: 0.6rem; color: #555; margin-bottom: 20px; }
        
        /* Viewport com Motor em SVG (Embutido) */
        #viewport { 
            width: 100%; height: 220px; border: 2px solid var(--neon); border-radius: 15px; 
            position: relative; overflow: hidden; background: #000;
            box-shadow: inset 0 0 20px rgba(0,242,255,0.2);
        }
        #motor-svg { width: 100%; height: 100%; transition: transform 4s ease-in-out; }

        /* Barra de Progresso */
        #scan-area { margin-top: 25px; display: none; }
        .bar-bg { width: 100%; height: 6px; background: #111; border-radius: 10px; border: 1px solid var(--neon); overflow: hidden; }
        .bar-fill { width: 0%; height: 100%; background: var(--neon); box-shadow: 0 0 15px var(--neon); transition: width 0.3s; }
        #status { font-size: 0.7rem; margin-top: 10px; color: #0f8; font-family: monospace; }

        /* Botão Estilizado */
        #main-btn { 
            margin-top: 30px; width: 100%; padding: 18px; background: none; 
            border: 1px solid var(--neon); color: var(--neon); font-weight: bold; 
            border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        #main-btn:hover { background: rgba(0,242,255,0.1); box-shadow: 0 0 20px rgba(0,242,255,0.3); }

        /* Resultado Final */
        #res { display: none; margin-top: 20px; border: 1px solid #0f8; padding: 15px; border-radius: 10px; background: rgba(0,255,100,0.05); }
    </style>
</head>
<body>

<div id="app">
    <h1>MotorScan Global AI</h1>
    <div class="sub">DIAGNÓSTICO ACÚSTICO ATIVO v3.0</div>

    <div id="viewport">
        <svg id="motor-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <path d="M40 60h120v80H40z" fill="none" stroke="#00f2ff" stroke-width="2"/>
            <path d="M60 40h80v20H60z" fill="none" stroke="#00f2ff" stroke-width="2"/>
            <circle cx="70" cy="100" r="15" fill="none" stroke="#00f2ff" stroke-width="1"/>
            <circle cx="130" cy="100" r="15" fill="none" stroke="#00f2ff" stroke-width="1"/>
            <line x1="40" y1="80" x2="160" y2="80" stroke="#00f2ff" stroke-width="1" stroke-dasharray="4"/>
            <path d="M80 140l-10 20h60l-10-20" fill="none" stroke="#00f2ff" stroke-width="2"/>
        </svg>
    </div>

    <div id="scan-area">
        <div class="bar-bg"><div class="bar-fill" id="fill"></div></div>
        <div id="status">INICIALIZANDO...</div>
    </div>

    <div id="res">
        <b style="color:#0f8">✓ ANÁLISE CONCLUÍDA</b><br>
        <small style="color:#aaa">Padrões térmicos e acústicos dentro da normalidade (SAE J306).</small>
    </div>

    <button id="main-btn">INICIAR VARREDURA</button>
</div>

<script>
    // Gerador de Áudio (Web Audio API) - Não precisa de arquivo!
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playBeep(freq, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    const btn = document.getElementById('main-btn');
    const fill = document.getElementById('fill');
    const status = document.getElementById('status');
    const svg = document.getElementById('motor-svg');

    const logs = [
        "Captação de ondas via mic...",
        "Filtragem de harmônicas...",
        "Processamento AI Madrox...",
        "Sincronização concluída!"
    ];

    btn.onclick = () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        btn.style.display = 'none';
        document.getElementById('scan-area').style.display = 'block';
        
        let step = 0;
        const interval = setInterval(() => {
            if (step < 4) {
                fill.style.width = ((step + 1) * 25) + "%";
                status.innerText = logs[step];
                svg.style.transform = `scale(${1.2 + (step * 0.3)}) rotate(${step * 2}deg)`;
                playBeep(880 + (step * 200), 0.15);
                step++;
            } else {
                clearInterval(interval);
                document.getElementById('scan-area').style.display = 'none';
                document.getElementById('res').style.display = 'block';
                playBeep(1200, 0.5);
            }
        }, 1500);
    };
</script>
</body>
</html>
