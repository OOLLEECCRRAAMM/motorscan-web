<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotorScan Global AI</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #app-container { width: 90%; max-width: 400px; text-align: center; }
        h1 { font-size: 1.2rem; letter-spacing: 2px; text-shadow: 0 0 10px #0ff; margin-bottom: 20px; }
        
        /* Moldura do Motor */
        #viewport { 
            width: 100%; height: 250px; border: 2px solid #0ff; border-radius: 15px; 
            overflow: hidden; position: relative; background: #111;
            box-shadow: inset 0 0 20px #000, 0 0 15px rgba(0,255,255,0.2);
        }
        #motor-img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 4s ease-in-out; transform: scale(1);
        }

        /* Barra de Progresso */
        #progress-box { width: 100%; margin-top: 20px; display: none; }
        #bar-container { width: 100%; height: 10px; background: #222; border-radius: 5px; overflow: hidden; border: 1px solid #0ff; }
        #bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #0ff, #00f); transition: width 0.3s; }
        #status-text { font-size: 0.8rem; margin-top: 8px; font-style: italic; color: #0f8; }

        /* Botão */
        button { 
            margin-top: 30px; padding: 15px 30px; background: none; border: 2px solid #0ff; 
            color: #0ff; font-weight: bold; border-radius: 5px; cursor: pointer; 
            text-transform: uppercase; transition: 0.3s;
        }
        button:active { background: #0ff; color: #000; }

        /* Resultado */
        #result { display: none; margin-top: 20px; padding: 15px; border: 1px solid #0f8; background: rgba(0,255,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>

<div id="app-container">
    <h1>MOTORSCAN GLOBAL AI 🌐</h1>
    <p style="font-size: 0.7rem; color: #888;">SISTEMA DE DIAGNÓSTICO ACÚSTICO</p>

    <div id="viewport">
        <img id="motor-img" src="generic/motor_bg.jpg" alt="Motor">
    </div>

    <div id="progress-box">
        <div id="bar-container"><div id="bar-fill"></div></div>
        <div id="status-text">Iniciando análise...</div>
    </div>

    <div id="result">
        <strong style="color: #0f8;">Análise concluída</strong><br>
        <span style="font-size: 0.9rem;">Nenhuma anomalia crítica detectada. Padrões acústicos estáveis.</span>
    </div>

    <button id="start-btn">Iniciar Passeio Técnico</button>
</div>

<audio id="beep-sound" src="ui/beep.mp3"></audio>

<script>
    const btn = document.getElementById('start-btn');
    const bar = document.getElementById('bar-fill');
    const status = document.getElementById('status-text');
    const img = document.getElementById('motor-img');
    const audio = document.getElementById('beep-sound');

    const etapas = [
        { p: 20, t: "Captando frequências...", zoom: 1.2 },
        { p: 50, t: "Filtrando ruídos externos...", zoom: 1.5 },
        { p: 80, t: "Cruzando dados AI...", zoom: 2.2 },
        { p: 100, t: "Sincronizando diagnóstico...", zoom: 2.5 }
    ];

    btn.onclick = () => {
        btn.style.display = 'none';
        document.getElementById('progress-box').style.display = 'block';
        
        // Tenta tocar o áudio no clique (regra de segurança dos celulares)
        audio.play().catch(() => console.log("Áudio aguardando interação"));

        etapas.forEach((etapa, index) => {
            setTimeout(() => {
                bar.style.width = etapa.p + "%";
                status.innerText = etapa.t;
                img.style.transform = `scale(${etapa.zoom})`;
                
                // Toca o bip em cada etapa
                audio.currentTime = 0;
                audio.play();

                if(etapa.p === 100) {
                    setTimeout(() => {
                        document.getElementById('progress-box').style.display = 'none';
                        document.getElementById('result').style.display = 'block';
                    }, 1000);
                }
            }, (index + 1) * 1500);
        });
    };
</script>

</body>
</html>
