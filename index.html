<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotorScan Global AI</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; color: #fff; }
        #app-container { position: relative; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Moldura do Motor */
        #motor-viewport { 
            position: relative; width: 90vw; height: 90vw; max-width: 400px; max-height: 400px;
            border: 2px solid #1a1a1a; border-radius: 20px; overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.2);
        }

        #motor-img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: transform 3s cubic-bezier(0.45, 0.05, 0.55, 0.95); 
        }

        /* Efeito de Zoom "Entrando no Motor" */
        .zoom-active { transform: scale(5) translate(10%, 10%); filter: blur(2px); opacity: 0.5; }

        /* Botão Estilizado */
        #btn-scan {
            margin-top: 30px; padding: 15px 40px; font-size: 18px; font-weight: bold;
            background: #00ffc8; color: #000; border: none; border-radius: 12px;
            cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0, 255, 200, 0.4);
            z-index: 10;
        }

        #status-text { margin-top: 15px; font-size: 12px; color: #00ffc8; letter-spacing: 1px; opacity: 0.8; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="motor-viewport">
        <img id="motor-img" src="generic/motor_bg.jpg" alt="Motor">
    </div>

    <button id="btn-scan" onclick="iniciarDiagnostico()">Iniciar Passeio Técnico</button>
    <div id="status-text">AGUARDANDO COMANDO...</div>
</div>

<script>
    // Pré-carregamento do áudio para evitar atraso no celular
    const somScan = new Audio('interface do usuário/beep.mp3'); 

    function iniciarDiagnostico() {
        const img = document.getElementById('motor-img');
        const btn = document.getElementById('btn-scan');
        const status = document.getElementById('status-text');

        // 1. Toca o som imediatamente (Interação do usuário libera o áudio)
        somScan.play().catch(e => console.log("Áudio bloqueado ou não encontrado"));

        // 2. Inicia o efeito visual de "Mergulho"
        img.classList.add('zoom-active');
        btn.style.display = 'none';
        status.innerText = 'NAVEGANDO PELAS ESQUINAS DO MOTOR...';

        // 3. Após o zoom, você pode redirecionar ou mostrar o laudo
        setTimeout(() => {
            status.innerText = 'MAPEAMENTO CONCLUÍDO. GERANDO LAUDO...';
            // Aqui podemos colocar a lógica para a próxima tela
        }, 3500);
    }
</script>

</body>
</html>
