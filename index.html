<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MotorScan Global AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
    header { position: fixed; top: 0; width: 100%; background: rgba(0, 0, 0, 0.85); border-bottom: 1px solid #00ffc8; padding: 14px; text-align: center; z-index: 100; }
    .logo { color: #00ffc8; font-size: 18px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; }
    .container { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 25px; padding: 80px 20px 20px; width: 100%; max-width: 500px; }
    .titulo { font-size: 12px; color: #888; letter-spacing: 2px; text-transform: uppercase; text-align: center; }
    .motor-frame { width: 100%; aspect-ratio: 16/9; overflow: hidden; border-radius: 12px; border: 1px solid #00ffc830; box-shadow: 0 0 30px #00ffc820; background: #111; position: relative; }
    .motor-img { width: 100%; height: 100%; object-fit: cover; transition: transform 3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
    .motor-img.zoom-ativo { transform: scale(5); }
    .scan-area { width: 100%; display: none; flex-direction: column; gap: 8px; }
    .scan-area.visivel { display: flex; }
    .barra-bg { width: 100%; height: 6px; background: #111; border-radius: 3px; overflow: hidden; border: 1px solid #00ffc820; }
    .barra-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00ffc8, #0088ff); transition: width 0.1s linear; }
    .status-texto { font-size: 11px; color: #00ffc8; text-align: center; font-style: italic; }
    .btn-iniciar { background: transparent; color: #00ffc8; border: 2px solid #00ffc8; padding: 16px 30px; border-radius: 4px; font-size: 14px; font-weight: 700; letter-spacing: 2px; cursor: pointer; box-shadow: 0 0 20px #00ffc830; }
    .resultado-area { width: 100%; display: none; flex-direction: column; gap: 12px; }
    .resultado-area.visivel { display: flex; }
    .resultado-card { background: #0a0a0a; border: 1px solid #00ffc830; border-radius: 8px; padding: 16px; }
    .resultado-valor { font-size: 15px; color: #00ffc8; font-weight: 600; margin-bottom: 5px; }
    .resultado-detalhe { font-size: 13px; color: #aaa; line-height: 1.5; }
    .btn-reiniciar { background: transparent; color: #555; border: 1px solid #222; padding: 10px; border-radius: 4px; font-size: 11px; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>

<header><div class="logo">MotorScan Global AI 🌐</div></header>

<div class="container">
  <p class="titulo">Sistema de Diagnóstico Acústico</p>
  <div class="motor-frame">
    <img id="motorImg" class="motor-img" src="generic/motor_bg.jpg" alt="Motor">
  </div>

  <div class="scan-area" id="scanArea">
    <div class="barra-bg"><div class="barra-fill" id="barraFill"></div></div>
    <p class="status-texto" id="statusTexto">Iniciando análise...</p>
  </div>

  <button class="btn-iniciar" id="btnIniciar" onclick="iniciarPasseio()">INICIAR PASSEIO TÉCNICO</button>

  <div class="resultado-area" id="resultadoArea">
    <div class="resultado-card">
      <div class="resultado-valor">Análise concluída</div>
      <div class="resultado-detalhe">Nenhuma anomalia crítica detectada. Os padrões acústicos estão dentro dos parâmetros nominais.</div>
    </div>
    <button class="btn-reiniciar" onclick="window.location.reload()">↺ NOVA ANÁLISE</button>
  </div>
</div>

<script>
let audioCtx = null;
let audioBuffer = null;

// Pré-carrega o som para não ter atraso
async function carregarAudio() {
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const resposta = await fetch('ui/beep.mp3');
        const arrayBuffer = await resposta.arrayBuffer();
        audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    } catch (e) { console.log("Erro ao carregar som:", e); }
}
carregarAudio();

function iniciarPasseio() {
    // Tocar Som
    if (audioCtx && audioBuffer) {
        const source = audioCtx.createBufferSource();
        source.buffer = audioBuffer;
        source.connect(audioCtx.destination);
        source.start(0);
    }

    // Efeito Visual
    document.getElementById("motorImg").classList.add("zoom-ativo");
    document.getElementById("btnIniciar").style.display = "none";
    document.getElementById("scanArea").classList.add("visivel");

    // Simular Progresso
    let progresso = 0;
    const barra = document.getElementById("barraFill");
    const texto = document.getElementById("statusTexto");

    const intervalo = setInterval(() => {
        progresso += 1;
        barra.style.width = progresso + "%";
        
        if(progresso == 30) texto.innerText = "Analisando frequências harmônicas...";
        if(progresso == 70) texto.innerText = "Comparando com banco de dados AI...";

        if (progresso >= 100) {
            clearInterval(intervalo);
            document.getElementById("scanArea").style.display = "none";
            document.getElementById("resultadoArea").classList.add("visivel");
        }
    }, 50); // Velocidade da barra
}
</script>
</body>
</html>
