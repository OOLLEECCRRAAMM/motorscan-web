<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MotorScan Global AI</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #motor-viewport { position: relative; width: 90vw; height: 90vw; max-width: 400px; border: 2px solid #1a1a1a; border-radius: 20px; overflow: hidden; }
        #motor-img { width: 100%; height: 100%; object-fit: cover; transition: transform 3s ease-in-out; }
        .zoom-active { transform: scale(5); }
        #btn-scan { margin-top: 30px; padding: 15px 40px; background: #00ffc8; color: #000; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .error-msg { color: #ff4444; font-size: 12px; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="motor-viewport">
    <img id="motor-img" src="genérico/motor_bg.jpg" onerror="document.getElementById('err-img').innerText='Erro: Imagem não encontrada na pasta genérico'">
</div>
<div id="err-img" class="error-msg"></div>

<button id="btn-scan" onclick="iniciar()">INICIAR PASSEIO TÉCNICO</button>
<div id="status">AGUARDANDO...</div>

<script>
    // Tratamento especial para pastas com espaços e acentos
    const pathSom = encodeURI('interface do usuário/beep.mp3');
    const som = new Audio(pathSom);

    function iniciar() {
        const img = document.getElementById('motor-img');
        const status = document.getElementById('status');
        
        // Tenta tocar o som
        som.play().catch(() => {
            status.innerHTML += '<br><span style="color:red">Erro no Som: Verifique a pasta "interface do usuário"</span>';
        });

        // Efeito de Zoom
        img.classList.add('zoom-active');
        status.innerText = 'NAVEGANDO PELO MOTOR...';
    }
</script>
</body>
</html>
